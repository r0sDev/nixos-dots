# ~/.config/yazi/theme.toml
# Tema monocromatico y minimalista (solo blanco / negro / gris)
#:schema https://yazi-rs.github.io/schemas/theme.json

# : Manager {{{
[mgr]
cwd = { fg = "white" }

find_keyword  = { fg = "white", bold = true, underline = true }
find_position = { fg = "gray", bg = "reset", bold = true }

symlink_target = { italic = true }

marker_copied   = { fg = "white", bg = "white" }
marker_cut      = { fg = "gray", bg = "gray" }
marker_marked   = { fg = "white", bg = "white" }
marker_selected = { fg = "white", bg = "white" }
marker_symbol   = "│"

count_copied   = { fg = "black", bg = "white" }
count_cut      = { fg = "black", bg = "gray" }
count_selected = { fg = "black", bg = "white" }

border_symbol = "│"
border_style  = { fg = "gray" }
# : }}}

# : Tabs {{{
[tabs]
active   = { fg = "black", bg = "white", bold = true }
inactive = { fg = "gray" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }
# : }}}

# : Mode {{{
[mode]
normal_main = { fg = "black", bg = "white", bold = true }
normal_alt  = { fg = "white", bg = "gray" }

select_main = { fg = "black", bg = "white", bold = true }
select_alt  = { fg = "white", bg = "gray" }

unset_main = { fg = "black", bg = "white", bold = true }
unset_alt  = { fg = "white", bg = "gray" }
# : }}}

# : Indicator of hovered file {{{
[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
# : }}}

# : Status bar {{{
[status]
overall = {}

perm_sep   = { fg = "gray" }
perm_type  = { fg = "white" }
perm_read  = { fg = "white" }
perm_write = { fg = "white" }
perm_exec  = { fg = "white" }

progress_label  = { fg = "white", bold = true }
progress_normal = { fg = "white", bg = "gray" }
progress_error  = { fg = "black", bg = "white" }
# : }}}

# : Which {{{
[which]
mask            = { bg = "black" }
cand            = { fg = "white" }
rest            = { fg = "gray" }
desc            = { fg = "white" }
separator       = " → "
separator_style = { fg = "gray" }
# : }}}

# : Confirmation {{{
[confirm]
border   = { fg = "white" }
title    = { fg = "white" }
btn_yes  = { reversed = true }
# : }}}

# : Picker {{{
[pick]
border   = { fg = "white" }
active   = { fg = "white", bold = true }
inactive = {}
# : }}}

# : Input {{{
[input]
border   = { fg = "white" }
title    = {}
value    = {}
selected = { reversed = true }
# : }}}

# : Completion {{{
[cmp]
border   = { fg = "white" }
active   = { reversed = true }
inactive = {}
# : }}}

# : Task manager {{{
[tasks]
border  = { fg = "white" }
title   = {}
hovered = { fg = "black", bg = "white", bold = true }
# : }}}

# : Help menu {{{
[help]
border  = { fg = "white" }
chord   = { fg = "white" }
hovered = { reversed = true, bold = true }
# : }}}

# : File-specific styles {{{
# Todo en blanco/gris; sin colores por tipo de archivo
[filetype]
rules = [
	{ mime = "*", fg = "white" },
	{ url = "*/", fg = "white", bold = true },
]
# : }}}
