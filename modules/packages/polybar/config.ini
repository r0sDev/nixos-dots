[colors]
background = ${xrdb:color0}
foreground = ${xrdb:color}
primary = ${xrdb:color1}
secondary = ${xrdb:color5}
alert = ${xrdb:color6}

[bar/bar_top]
monitor = ${env:MONITOR:}
width = 25%
height = 20
offset-x = 37.5%
fixed-center = true
wm-restack = generic
override-redirect = true


background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #f00

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 0

font-0 = Fairfax:size=10

modules-left = battery 
modules-center = date
modules-right = network memory cpu

cursor-click = link
cursor-scroll = ns-resize

[module/filesystem]
type = internal/fs
interval = 10
mount-0 = /
format-mounted = <label-mounted>
label-mounted = " %percentage_used%%"

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${xrdb:color2}
label = "%percentage%% "

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${xrdb:color2}
label = %percentage_used%%

[module/date]
type = internal/date
interval = 5
time = "%H:%M"
label = %time%

[settings]
screenchange-reload = true

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = "%percentage%% charging"
label-discharging = "%percentage%% discharging"
label-full = "full"
format-charging-prefix = ""  
format-charging-prefix-foreground = ${xrdb:color2}

[module/network]
type = internal/network
interface = wlp2s0
interface-type = wired
accumulate-stats = true
format-connected = <label-connected>
label-connected = %local_ip%
format-disconnected = <label-disconnected>
label-disconnected = "ip: none"
